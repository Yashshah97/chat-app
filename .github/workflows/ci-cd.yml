name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  go-tests:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_DB: chat_app_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: Install dependencies
      working-directory: ./backend
      run: go mod download
    
    - name: Run Go tests
      working-directory: ./backend
      env:
        DB_HOST: localhost
        DB_PORT: 5432
        DB_USER: postgres
        DB_PASSWORD: postgres
        DB_NAME: chat_app_test
      run: go test -v -race -coverprofile=coverage.out ./...
    
    - name: Build Go application
      working-directory: ./backend
      run: go build -o chat-server
    
    - name: Upload coverage
      uses: actions/upload-artifact@v3
      with:
        name: go-coverage
        path: backend/coverage.out

  angular-tests:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Node.js
      uses: actions/setup-node@v3
      with:
        node-version: '18'
    
    - name: Install dependencies
      working-directory: ./frontend
      run: npm install
    
    - name: Run Angular tests
      working-directory: ./frontend
      run: npm test -- --watch=false --browsers=ChromeHeadless
    
    - name: Build Angular application
      working-directory: ./frontend
      run: npm run build
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v3
      with:
        name: angular-dist
        path: frontend/dist

  go-lint:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Go
      uses: actions/setup-go@v4
      with:
        go-version: '1.21'
    
    - name: golangci-lint
      uses: golangci/golangci-lint-action@v3
      with:
        working-directory: ./backend
        version: latest
        args: --timeout=5m

  security-scan:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Run Trivy vulnerability scanner
      uses: aquasecurity/trivy-action@master
      with:
        scan-type: 'fs'
        scan-ref: '.'
        severity: 'CRITICAL,HIGH'
        exit-code: '0'

  docker-build:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [go-tests, angular-tests]
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v2
    
    - name: Build backend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./backend
        push: false
        tags: chat-app-backend:latest
    
    - name: Build frontend Docker image
      uses: docker/build-push-action@v4
      with:
        context: ./frontend
        push: false
        tags: chat-app-frontend:latest

  build-success:
    runs-on: ubuntu-latest
    needs: [go-tests, angular-tests, go-lint]
    if: always()
    
    steps:
    - name: Check build status
      run: |
        if [ "${{ needs.go-tests.result }}" == "failure" ] || [ "${{ needs.angular-tests.result }}" == "failure" ]; then
          echo "Build failed!"
          exit 1
        fi
        echo "All tests passed!"
